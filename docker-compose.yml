services:
  db:
    image: postgres:14-alpine
    container_name: realtime_logs_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realtime_logs
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realtime_logs_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      API_KEYS: "dev-key"
      POSTGRES_DSN: "host=db user=postgres password=postgres dbname=realtime_logs port=5432 sslmode=disable TimeZone=UTC"